# Nginx reverse proxy with TLS, WAF hook (ModSecurity), and per-route rate limits.
# Replace certificates and upstream addresses for your environment.

load_module modules/ngx_http_modsecurity_module.so;

user  nginx;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections  4096; }

http {
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsec/main.conf;

    # 100 requests/min per IP (burst 20) for write-heavy routes
    limit_req_zone $binary_remote_addr zone=write_zone:10m rate=100r/m;
    # 600 requests/min per IP for reads
    limit_req_zone $binary_remote_addr zone=read_zone:20m rate=600r/m;

    map $request_uri $ratelimit_zone {
        default         read_zone;
        ~^/api/v1/rag   write_zone;
        ~^/api/v1/documents/upload write_zone;
        ~^/api/v1/projects          write_zone;
        ~^/api/v1/admin             write_zone;
    }

    server {
        listen 443 ssl http2;
        server_name api.example.com;

        ssl_certificate     /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Basic body size guard; FastAPI also enforces size limits
        client_max_body_size 25m;

        location / {
            limit_req zone=$ratelimit_zone burst=20 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://backend:8000;
        }
    }

    server {
        listen 80;
        server_name api.example.com;
        return 301 https://$host$request_uri;
    }
}
