name: Backend CI

on:
  push:
    branches: [main, develop]
    paths: ["backend/**"]
  pull_request:
    branches: [main, develop]
    paths: ["backend/**"]

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt ruff mypy
      - run: ruff check app/
      - run: ruff format --check app/
      - run: mypy app/ --ignore-missing-imports --no-strict-optional

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ragify_test
          POSTGRES_PASSWORD: ragify_test
          POSTGRES_DB: ragify_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://ragify_test:ragify_test@localhost:5432/ragify_test
      REDIS_URL: redis://localhost:6379
      SUPABASE_JWT_SECRET: test-secret-ci
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_KEY: placeholder
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_TEST }}
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - run: alembic upgrade head
      - run: pytest tests/unit/ -v --tb=short
